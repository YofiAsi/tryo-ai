version: '3.8'

services:
  hr-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: hr-backend-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      # Add your environment variables here
      # - DATABASE_URL=mongodb://mongodb:27017/hr_db
      # - REDIS_URL=redis://redis:6379
    volumes:
      - ./logs:/app/logs
    networks:
      - hr-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:7.0
    container_name: hr-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=hr_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - hr-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    container_name: hr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Celery worker for background tasks
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: hr-celery-worker
    restart: unless-stopped
    command: ["celery", "-A", "celery_worker", "worker", "--loglevel=info"]
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      # Add your environment variables here
      # - DATABASE_URL=mongodb://mongodb:27017/hr_db
      # - REDIS_URL=redis://redis:6379
    volumes:
      - ./logs:/app/logs
    networks:
      - hr-network
    depends_on:
      - mongodb
      - redis

volumes:
  mongodb_data:
  redis_data:

networks:
  hr-network:
    driver: bridge
