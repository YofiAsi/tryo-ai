services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tyro-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./infra/configs/.env
    depends_on:
      - mongo
      - redis
      - litellm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tyro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: tyro-frontend
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./infra/configs/.env
    networks:
      - tyro-network
    restart: unless-stopped

  batch_manager:
    build:
      context: ./batch_manager
      dockerfile: Dockerfile.dev
    container_name: tyro-batch-manager
    ports:
      - "8001:8000"
      - "5678:5678"
    volumes:
      - ./batch_manager/app:/app/app
    env_file:
      - ./infra/configs/.env
    environment:
      - MINIO_ENDPOINT=tyro-minio:9000
      - MINIO_SECURE=false
      - MINIO_BATCH_TASKS_BUCKET=batch-tasks
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - DEBUG_MODE=true
      - MONGODB_URL=mongodb://tyro-mongo:27017/tyro_batch_manager
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - BREAK_ON_EXCEPTIONS=true
      - PYTHONUNBUFFERED=1
      - PYTHONFAULTHANDLER=1
    depends_on:
      - mongo
      - minio
    networks:
      - tyro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: tyro-litellm
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    volumes:
      - ./infra/litellm/config.yaml:/etc/litellm/config.yaml:ro
    env_file:
      - ./infra/configs/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tyro-network
    restart: unless-stopped

  mongo:
    image: mongodb/mongodb-atlas-local
    container_name: tyro-mongo
    ports:
      - "27017:27017"
    volumes:
      - tyro-mongo-data:/data/db
      - tyro-mongo-config:/data/configdb
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ:-UTC}
    env_file:
      - ./infra/configs/.env
    networks:
      - tyro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: tyro-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - tyro-redis-data:/data
    networks:
      - tyro-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: tyro-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - tyro-minio-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ:-UTC}
    env_file:
      - ./infra/configs/.env
    networks:
      - tyro-network
    restart: unless-stopped

networks:
  tyro-network:

volumes:
  tyro-mongo-data:
  tyro-mongo-config:
  tyro-redis-data:
  tyro-minio-data:
