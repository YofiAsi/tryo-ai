events {
    worker_connections 1024;
}

http {
    upstream tyro-frontend {
        server tyro-frontend:80;  # Assuming tyro-frontend runs on port 3000
    }

    upstream tyro-backend-api {
        server tyro-backend-api:8000;  # Assuming tyro-backend-api runs on port 8000
    }

    server {
        listen 80;
        server_name localhost;

        # Forward /api requests to tyro-backend-api
        location /api {
            proxy_pass http://tyro-backend-api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Handle WebSocket connections if needed
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Forward all other requests (including /) to tyro-frontend
        location / {
            proxy_pass http://tyro-frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Handle WebSocket connections if needed
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
